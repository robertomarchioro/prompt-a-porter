name: Security Audit

on:
  workflow_dispatch:
  schedule:
    # Giornaliero: il DB di govulncheck/RustSec si aggiorna di continuo,
    # il run quotidiano accorcia la finestra di esposizione a ~1 giorno.
    - cron: "23 5 * * *"

permissions:
  contents: read

jobs:
  rust-audit:
    name: cargo audit (client Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Installa cargo-audit
        run: cargo install cargo-audit --locked

      # Cargo.lock è ora committato nel repo (strategia CI stabilità+sicurezza).
      # cargo audit può quindi auditare il lockfile effettivo usato in CI
      # anziché dover generare un lock temporaneo ad ogni run.
      - name: Audit Cargo.lock
        working-directory: apps/client/src-tauri
        run: cargo audit

  go-audit-server:
    name: govulncheck (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          # Pin esatto: setup-go con "1.25" può risolvere a una patch
          # precedente se l'ultima non è ancora nel manifests cache.
          # Da bumpare a ogni patch stdlib con fix sicurezza
          # (storico: GO-2026-5039, GO-2026-5037, GO-2026-5856).
          go-version: "1.25.12"
          cache-dependency-path: apps/server/go.sum

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/server
        run: govulncheck ./...

  go-audit-cli:
    name: govulncheck (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.12"

      - name: Genera go.sum
        working-directory: apps/cli
        run: go mod tidy

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/cli
        run: govulncheck ./...

  pnpm-audit:
    name: pnpm audit (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Audit deps (no install richiesto)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  notifica-fallimento:
    name: Apri issue su fallimento
    runs-on: ubuntu-latest
    needs: [rust-audit, go-audit-server, go-audit-cli, pnpm-audit]
    if: failure()
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Crea o aggiorna issue di segnalazione
        run: |
          TITLE="Security Audit fallito: intervenire"
          EXISTING=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$GITHUB_REPOSITORY" \
              --body "Nuovo fallimento del run schedulato: $RUN_URL"
            exit 0
          fi
          BODY="Il run schedulato di **Security Audit** è fallito: $RUN_URL

          Passi per il fix:
          1. Aprire il log del job fallito e identificare l'advisory (es. GO-XXXX-XXXX, RUSTSEC-XXXX-XXXX).
          2. Verificare in quale versione è corretta (per Go stdlib: bump del pin \`go-version\` nei workflow; per dipendenze: bump in go.mod/Cargo.toml/package.json).
          3. Aprire una PR col fix minimale e attendere il verde di questo workflow (rilanciabile con \`gh workflow run security-audit.yml\`).

          Issue aperta automaticamente dal job \`notifica-fallimento\`; i fallimenti successivi vengono aggiunti come commento."
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" \
            --body "$BODY" --label security 2>/dev/null || \
          gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body "$BODY"
