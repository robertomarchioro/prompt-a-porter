name: Security Audit

on:
  workflow_dispatch:
  schedule:
    # Lunedì alle 06:00 UTC settimanale
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  rust-audit:
    name: cargo audit (client Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Installa cargo-audit
        run: cargo install cargo-audit --locked

      # Cargo.lock è ora committato nel repo (strategia CI stabilità+sicurezza).
      # cargo audit può quindi auditare il lockfile effettivo usato in CI
      # anziché dover generare un lock temporaneo ad ogni run.
      - name: Audit Cargo.lock
        working-directory: apps/client/src-tauri
        run: cargo audit

  go-audit-server:
    name: govulncheck (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          # Pin esatto 1.25.11 per fix GO-2026-5039 (net/textproto) e
          # GO-2026-5037 (crypto/x509), raggiunte da http.ListenAndServe.
          # Setup-go con "1.25" può risolvere a una patch precedente se
          # l'ultima non è ancora nel manifests cache — pin sempre esatto.
          go-version: "1.25.11"
          cache-dependency-path: apps/server/go.sum

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/server
        run: govulncheck ./...

  go-audit-cli:
    name: govulncheck (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.11"

      - name: Genera go.sum
        working-directory: apps/cli
        run: go mod tidy

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/cli
        run: govulncheck ./...

  pnpm-audit:
    name: pnpm audit (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Audit deps (no install richiesto)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
