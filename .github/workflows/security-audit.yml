name: Security Audit

on:
  workflow_dispatch:
  schedule:
    # Lunedì alle 06:00 UTC settimanale
    - cron: "0 6 * * 1"

jobs:
  rust-audit:
    name: cargo audit (client Tauri)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Installa cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Cargo.lock
        working-directory: apps/client/src-tauri
        run: cargo audit

  go-audit-server:
    name: govulncheck (server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Pin esatto 1.25.10 per fix GO-2026-4971 (panic in net.Listen
          # con NUL byte su Windows). Setup-go con "1.25" può risolvere
          # a 1.25.9 se 1.25.10 non è ancora nel manifests cache.
          go-version: "1.25.10"
          cache-dependency-path: apps/server/go.sum

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/server
        run: govulncheck ./...

  go-audit-cli:
    name: govulncheck (CLI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Genera go.sum
        working-directory: apps/cli
        run: go mod tidy

      - name: Installa govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Vuln check
        working-directory: apps/cli
        run: govulncheck ./...

  pnpm-audit:
    name: pnpm audit (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Audit deps (no install richiesto)
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
