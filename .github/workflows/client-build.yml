name: Client Build

on:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  pull_request:
    branches: [main]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pap/client lint

      - name: Type check
        run: pnpm --filter @pap/client check

      - name: Test TypeScript
        run: pnpm --filter @pap/client test

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Cargo test
        working-directory: apps/client/src-tauri
        run: cargo test

  # La build multi-OS dei bundle è in .github/workflows/release.yml,
  # triggerata da tag `v*` per evitare di consumare minuti su ogni PR.
