name: Client Build

on:
  push:
    branches: [main, feat/redesign-v08]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/client-build.yml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  pull_request:
    branches: [main, feat/redesign-v08]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/client-build.yml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pap/client lint

      - name: Type check
        run: pnpm --filter @pap/client check

      - name: Test TypeScript con coverage (gate 70%)
        run: pnpm --filter @pap/client test:coverage

      # Build di produzione: svelte-check/vitest NON eseguono il bundle vite,
      # quindi una rottura del bundler (es. vite 8/rolldown che rifiuta la
      # forma a oggetto di manualChunks) passava la CI e rompeva solo la
      # release. Questo step la coglie prima del tag.
      - name: Build frontend (produzione)
        run: pnpm --filter @pap/client build:frontend

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: llvm-tools-preview

      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      # cargo-llvm-cov: tooling di line/region coverage per Rust su stable.
      # Usa l'action ufficiale taiki-e per fetch del binario pre-compilato
      # (no compile, ~5 sec invece dei ~3 minuti di cargo install).
      - name: Installa cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Threshold floor 80% anti-regressione (M7 v1.0 PR-6).
      # Coverage attuale ~80.2% line post M7 PR-1..PR-6 (vault 91%, audit 93%,
      # cartelle 90%, libreria 92%, preferenze 91%, prompt 84%).
      # Embeddings/sync restano sotto soglia ma compensati dai moduli core.
      # Vedi docs/operativo/coverage.md.
      - name: Cargo test + coverage gate
        working-directory: apps/client/src-tauri
        run: cargo llvm-cov --lib --summary-only --fail-under-lines 80 --locked

  # La build multi-OS dei bundle è in .github/workflows/release.yml,
  # triggerata da tag `v*` per evitare di consumare minuti su ogni PR.
