name: Client Build

on:
  push:
    branches: [main]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pap/client lint

      - name: Type check
        run: pnpm --filter @pap/client check

