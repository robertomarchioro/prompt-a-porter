name: Client Build

on:
  push:
    branches: [main, feat/redesign-v08]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/client-build.yml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  pull_request:
    branches: [main, feat/redesign-v08]
    paths:
      - "apps/client/**"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/client-build.yml"
      - "!apps/client/**/*.md"
      - "!apps/client/**/CHANGELOG.md"
      - "!apps/client/**/LICENSE"
      - "!packages/**/*.md"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @pap/client lint

      - name: Type check
        run: pnpm --filter @pap/client check

      - name: Test TypeScript
        run: pnpm --filter @pap/client test

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Installa dipendenze sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      # cargo-llvm-cov: tooling di line/region coverage per Rust su stable.
      # Usa l'action ufficiale taiki-e per fetch del binario pre-compilato
      # (no compile, ~5 sec invece dei ~3 minuti di cargo install).
      - name: Installa cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Threshold floor 70% anti-regressione (Step 10 Fase 3 + v0.7.0 Step 1).
      # Coverage attuale ~74% line post v0.7 Step 1 (import_export 79%,
      # embeddings 41%). Roadmap: portare a 78% in v0.8 focalizzando sul
      # refactor HTTP mock di embeddings.rs (resta sotto 50%).
      # Vedi docs/operativo/coverage.md.
      - name: Cargo test + coverage gate
        working-directory: apps/client/src-tauri
        run: cargo llvm-cov --lib --summary-only --fail-under-lines 70

  # La build multi-OS dei bundle è in .github/workflows/release.yml,
  # triggerata da tag `v*` per evitare di consumare minuti su ogni PR.
