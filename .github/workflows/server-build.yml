name: Server Build

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "!apps/server/**/*.md"
      - "!apps/server/**/CHANGELOG.md"
      - "!apps/server/**/LICENSE"
  pull_request:
    branches: [main]
    paths:
      - "apps/server/**"
      - "!apps/server/**/*.md"
      - "!apps/server/**/CHANGELOG.md"
      - "!apps/server/**/LICENSE"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: apps/server/go.sum

      - name: Vet
        working-directory: apps/server
        run: go vet ./...

      # TODO: riattivare golangci-lint quando l'action supporta stabilmente v2
      # (v1.64.8 è build su Go 1.24, incompatibile con Go 1.25 della codebase)

      - name: Test
        working-directory: apps/server
        run: go test -race -coverpkg=./... -coverprofile=coverage.out ./...

      - name: Coverage check
        working-directory: apps/server
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          # Soglia 50% riflette lo stato attuale (test integrazione cross-package).
          # Action item: alzare a 70% in v0.3 con unit test mirati.
          if (( $(echo "$COVERAGE < 50" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% sotto la soglia del 50%"
            exit 1
          fi

