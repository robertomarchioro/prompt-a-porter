name: Server Build

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - "!apps/server/**/*.md"
      - "!apps/server/**/CHANGELOG.md"
      - "!apps/server/**/LICENSE"
  pull_request:
    branches: [main]
    paths:
      - "apps/server/**"
      - "!apps/server/**/*.md"
      - "!apps/server/**/CHANGELOG.md"
      - "!apps/server/**/LICENSE"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: apps/server/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/server

      - name: Test
        working-directory: apps/server
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage check
        working-directory: apps/server
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% sotto la soglia del 70%"
            exit 1
          fi

