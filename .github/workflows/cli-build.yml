name: CLI Build

on:
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
      - "!apps/cli/**/*.md"
      - "!apps/cli/**/CHANGELOG.md"
      - "!apps/cli/**/LICENSE"
  pull_request:
    branches: [main]
    paths:
      - "apps/cli/**"
      - "!apps/cli/**/*.md"
      - "!apps/cli/**/CHANGELOG.md"
      - "!apps/cli/**/LICENSE"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: apps/cli/go.sum

      - name: Tidy + vet
        run: |
          go mod tidy
          go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          working-directory: apps/cli
          version: latest

  cross-compile:
    needs: lint-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: apps/cli/go.sum

      - name: Resolve dependencies (genera go.sum se mancante)
        run: go mod tidy

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          # Versione allineata all'app (fonte: apps/client/package.json).
          VER=$(grep -m1 '"version"' ../client/package.json | sed -E 's/.*"version"[^"]*"([^"]+)".*/\1/')
          echo "cliVersion = ${VER:-dev}"
          go build -ldflags="-s -w -X main.cliVersion=${VER:-dev}" -o dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Verifica artefatto
        run: |
          ls -la dist/
          test -f dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pap-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apps/cli/dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 30
