name: CLI Build

on:
  push:
    branches: [main]
    paths:
      - "apps/cli/**"
      - "!apps/cli/**/*.md"
      - "!apps/cli/**/CHANGELOG.md"
      - "!apps/cli/**/LICENSE"
  pull_request:
    branches: [main]
    paths:
      - "apps/cli/**"
      - "!apps/cli/**/*.md"
      - "!apps/cli/**/CHANGELOG.md"
      - "!apps/cli/**/LICENSE"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: apps/cli/go.sum

      - name: Verifica go.sum e vet
        run: |
          go mod tidy
          git diff --exit-code go.sum
          go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage report
        run: go tool cover -func=coverage.out

      - name: Lint (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/cli
          version: latest

  cross-compile:
    needs: lint-and-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache-dependency-path: apps/cli/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Verifica artefatto
        run: |
          ls -la dist/
          test -f dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pap-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apps/cli/dist/pap-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 30
