name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: target Windows (NSIS + portable), Linux (deb + AppImage)
          # e macOS (app + dmg, binario UNIVERSALE arm64+x86_64) attivi.
          - platform: macos-14
            # macOS: bundle .app + .dmg come binario UNIVERSALE
            # (universal-apple-darwin = lipo di aarch64 + x86_64), così gira
            # nativo sia su Apple Silicon sia su Mac Intel. Un solo .dmg per
            # tutti; tauri-action emette entry updater sia darwin-aarch64 sia
            # darwin-x86_64 verso lo stesso artifact.
            # NB: il secondo target (x86_64) NON si installa via `rust-target`
            # (la lista comma-separata è ignorata dall'action e finirebbe
            # comunque sulla toolchain sbagliata) → lo aggiunge lo step
            # dedicato "Aggiungi target x86_64" più sotto, nella dir del pin.
            # Firma Developer ID + notarizzazione avvengono QUI in CI via env
            # APPLE_* (v. step tauri-action e docs/operativo/firma-macos.md);
            # il box Windows di firma non tocca gli artifact darwin
            # (sign-release.ps1 li lascia invariati: firma Ed25519 CI valida).
            # Senza i secret APPLE_* la build esce unsigned (test pre-cert).
            args: "--target universal-apple-darwin --bundles app,dmg"
            rust-target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            # Linux: deb + AppImage (l'AppImage alimenta anche l'updater).
            # rpm escluso di proposito: `targets: "all"` in tauri.conf.json
            # lo includerebbe, ma richiede `rpmbuild` non installato sul runner.
            args: "--bundles deb,appimage"
            rust-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            # Bundle ristretto a NSIS (`--bundles nsis`): l'MSI è stato
            # rimosso di proposito perché WiX/MSI installa per-machine in
            # Program Files richiedendo UAC/admin, mentre PaP è local-first
            # single-user e vuole installazione senza privilegi. NSIS è
            # configurato `installMode: currentUser` in tauri.conf.json
            # (%LocalAppData%, no admin). Il portable .zip resta invariato:
            # è prodotto dal binario raw in `target/release/`, non da un
            # bundle. NB: `--no-bundle` NON sarebbe usabile (tauri-action
            # fallisce con "No artifacts were found"); `--bundles nsis`
            # produce comunque un bundle, quindi va bene.
            # Updater: con `createUpdaterArtifacts: true` l'updater riusa
            # il bundle NSIS → `latest.json` + `setup.exe.sig` generati
            # regolarmente (l'MSI updater era ridondante).
            # Asset release: setup.exe (+ .sig) + latest.json + portable.zip.
            args: "--bundles nsis"
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Installa dipendenze sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}

      # Binario universale macOS: aggiungi x86_64 ALLA toolchain pinnata.
      # DEVE girare in apps/client/src-tauri, dove rust-toolchain.toml
      # (channel 1.96.0) è attivo — altrimenti il target va sulla `stable`
      # e la build fallisce con "Target x86_64-apple-darwin is not installed".
      # Verificato col workflow macos-smoke prima di v0.8.36.
      - name: Aggiungi target x86_64 per il binario universale (macOS)
        if: matrix.platform == 'macos-14'
        working-directory: apps/client/src-tauri
        run: rustup target add x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/client/src-tauri

      - name: Installa dipendenze pnpm
        run: pnpm install --frozen-lockfile

      # La CLI `pap` viene bundlata come risorsa nell'installer NSIS
      # (tauri.windows.conf.json, auto-merged solo su Windows). Va compilata
      # PRIMA di tauri-action, in apps/client/src-tauri/pap.exe, così il
      # bundler la trova. Solo windows/amd64: l'installer è x64.
      - name: Setup Go (CLI da bundlare, solo Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.11"
          cache-dependency-path: apps/cli/go.sum

      - name: Compila la CLI pap per il bundle installer (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        working-directory: apps/cli
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: |
          go mod tidy
          VER="${GITHUB_REF_NAME#v}"
          go build -ldflags="-s -w -X main.cliVersion=${VER}" -o ../client/src-tauri/pap.exe .
          test -f ../client/src-tauri/pap.exe && echo "pap.exe pronto per il bundle"

      - name: Build & release Tauri
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # v1.0 M1.4 — Tauri Updater signing (Ed25519, separato da
          # Authenticode). tauri-action genera `latest.json` + `.sig` se
          # questi secret sono presenti. Vedi
          # docs/architettura/decisioni/authenticode-signing.md
          # §"Tauri Updater key pair" per la procedura di generazione.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # v1.0 — firma macOS in CI (Developer ID Application + notarization
          # via app-specific password). tauri-action firma e notarizza solo
          # se questi secret sono valorizzati; assenti ⇒ build unsigned.
          # Procedura completa: docs/operativo/firma-macos.md.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/client
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Prompt a Porter ${{ github.ref_name }}"
          releaseBody: |
            Build automatica dal tag `${{ github.ref_name }}`.

            Vedi [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) per il dettaglio.

            > ⚠️ **Release in stato draft — signing pending.**
            > Gli asset sono presenti ma NON ancora firmati Authenticode
            > e i `.sig` Ed25519 sono calcolati sui binari unsigned
            > (verranno rigenerati post-signing). Il maintainer eseguirà
            > `scripts/sign-release.ps1` da workstation Windows con
            > SimplySign Desktop logged-in + chiave Updater locale, poi
            > promuoverà la release a Latest published.
            >
            > Vedi `docs/contribuire/release-signing-workflow.md`.

            **Versione portable Windows:**
            il file `Prompt-a-Porter-portable-windows-x64-${{ github.ref_name }}.zip`
            contiene l'eseguibile standalone, senza installer. Estrai e lancia
            `Prompt a Porter.exe`. Richiede WebView2 runtime (incluso in
            Windows 11, scaricabile [da Microsoft](https://developer.microsoft.com/microsoft-edge/webview2/)
            per Windows 10).

            Dopo signing, il binario sarà firmato Authenticode (Certum Code
            Signing Open Source). La prima esecuzione potrebbe ancora mostrare
            un avviso SmartScreen (reputation building del nuovo certificato):
            clicca "Maggiori informazioni" → "Esegui comunque". L'avviso
            scompare con l'uso.

            **Installer Windows (NSIS):** oltre al portable, la release
            include `…-setup.exe`, un installer **per-utente** che installa
            in `%LocalAppData%` **senza richiedere privilegi admin/UAC**.
            L'MSI è stato rimosso di proposito: WiX/MSI installa in
            `Program Files` ed esige elevazione, contro la filosofia
            local-first single-user di PaP.

            **Linux:** la release include anche i pacchetti `.deb` e
            `.AppImage` (x86_64). L'AppImage supporta l'auto-update.

            **macOS:** la release include l'app come binario universale
            (`.dmg`, arm64 + Intel x86_64), firmata Developer ID e notarizzata in CI.

            **CLI (`pap`):** la release include anche i binari della CLI per
            Windows, macOS e Linux (`pap-<os>-<arch>`, arch amd64 e arm64).
            Scarica quello della tua piattaforma, mettilo nel PATH ed è pronto —
            niente Go, niente compilazione. I binari CLI **non sono firmati**:
            su macOS al primo avvio togli la quarantena con
            `xattr -d com.apple.quarantine ./pap-darwin-arm64`; su Windows
            SmartScreen può avvisare (Maggiori informazioni → Esegui comunque).
            In più, **l'installer Windows** (`…-setup.exe`) offre in fase di
            installazione di aggiungere la CLI al PATH: in quel caso `pap` è
            subito disponibile dal terminale, senza scaricare nulla a parte.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # M1.2 v1.0 — Authenticode signing via PRE-SIGNING LOCALE.
      #
      # Razionale: Certum SimplySign Cloud richiede SimplySign Desktop
      # in modalità GUI logged-in per esporre il cert via virtual smart
      # card. Non esiste un metodo headless documentato (verificato con
      # PDF Certum, blog defguard, container hpvb/certum-container,
      # ricerca community: tutti richiedono interazione GUI manuale,
      # tipicamente VNC + re-login ogni 2h). Tentativi CI dal tag
      # v0.8.9-test al v0.8.9-test4 hanno confermato il blocker.
      #
      # La pipeline CI quindi:
      # 1. Genera asset unsigned (.exe, .msi, .zip portable) in release draft
      # 2. tauri-action genera latest.json + .sig Ed25519 (Tauri Updater
      #    signing, separato da Authenticode — già attivo via TAURI_SIGNING_*)
      # 3. Il maintainer scarica gli asset, esegue
      #    `scripts/sign-release.ps1 -Tag <tag>` da workstation Windows
      #    con SimplySign Desktop logged-in, firma con signtool +
      #    virtual smart card, re-upload, promuove la release a Latest.
      #
      # Vedi docs/contribuire/release-signing-workflow.md per la procedura
      # operativa completa e docs/architettura/decisioni/authenticode-signing.md
      # §"Strategia pre-signing locale" per il rationale architetturale.

      # Windows portable: zippa il .exe standalone + README e lo carica come
      # asset extra della release draft. Pattern Chrome/VSCode portable —
      # utente estrae lo zip e lancia l'eseguibile, niente installer.
      - name: Pacchettizza versione portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          # Interpolare ${{ github.* }} direttamente in un blocco `run:`
          # espone a script injection (il valore finirebbe incollato nello
          # script prima dell'esecuzione). Passiamo i valori via env così
          # PowerShell li legge come dati, non come sorgente.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          $finalName = "Prompt a Porter.exe"
          $releaseDir = "apps/client/src-tauri/target/release"

          # Preferisci il binario rinominato dal bundle Tauri (productName);
          # fallback sul binario Cargo (package.name) e rinomina nel zip.
          $exePath = $null
          $candidatesByName = @(
            "$releaseDir/$finalName",
            "$releaseDir/pap.exe"
          )
          foreach ($c in $candidatesByName) {
            if (Test-Path $c) {
              $exePath = $c
              break
            }
          }
          # Fallback ulteriore: glob su qualsiasi .exe nella radice di release/
          # (esclude la subdir bundle/ che contiene gli installer NSIS/MSI).
          if (-not $exePath) {
            $exePath = Get-ChildItem -Path $releaseDir -Filter *.exe -File `
              | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $exePath -or -not (Test-Path $exePath)) {
            Write-Error "Eseguibile portable non trovato in $releaseDir."
            Write-Host "Contenuto di $releaseDir :"
            Get-ChildItem -Path $releaseDir -Filter *.exe -File `
              | Format-Table Name, Length
            exit 1
          }
          Write-Host "Eseguibile portable scelto: $exePath"

          $tag = $env:TAG
          $stagingDir = "portable-staging"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          # Rinomina sempre a "Prompt a Porter.exe" nel zip per coerenza UX
          # con il bundle installer.
          Copy-Item $exePath -Destination "$stagingDir/$finalName"

          $readmeContent = @"
          Prompt a Porter — versione portable Windows ($tag)
          ===================================================

          Questa cartella contiene la versione portable di Prompt a Porter:
          un singolo eseguibile, niente installer, niente registro modificato.

          Come usare
          ----------
          1. Estrai questo zip dove preferisci (pen drive, Documents, etc.)
          2. Doppio click su "Prompt a Porter.exe"
          3. Al primo avvio Windows SmartScreen potrebbe avvisarti perché
             il binario non è firmato Authenticode. Clicca "Maggiori
             informazioni" -> "Esegui comunque".

          Requisiti
          ---------
          - Windows 10 (1803+) o Windows 11
          - WebView2 Runtime: incluso in Windows 11. Su Windows 10 va
            installato manualmente da:
            https://developer.microsoft.com/microsoft-edge/webview2/

          Dati utente
          -----------
          Il vault e le preferenze vengono salvati in
          %APPDATA%\com.pap.client\ (NON nella cartella dell'eseguibile).
          Per una vera modalita "portable senza traccia" copia anche
          la cartella %APPDATA%\com.pap.client\ sulla pen drive.

          Disinstallare
          -------------
          Cancella la cartella estratta. Per rimuovere anche i dati,
          cancella %APPDATA%\com.pap.client\.

          Source: https://github.com/$env:REPO
          Licenza: AGPL-3.0-only
          "@
          $readmeContent | Out-File -FilePath "$stagingDir/README.txt" -Encoding utf8

          # Marker per il rilevamento "portable" a runtime
          # (apps/client/src-tauri/src/lib.rs::is_portable): la presenza di
          # questo file accanto all'exe segnala la versione portable, in cui
          # l'opzione "avvia all'avvio del computer" e' esclusa (il path
          # dell'exe portable non e' stabile). L'installer NSIS non lo crea.
          New-Item -ItemType File -Force -Path "$stagingDir/.portable" | Out-Null

          $zipName = "Prompt-a-Porter-portable-windows-x64-$tag.zip"
          # -Force per includere anche il dotfile .portable: Compress-Archive
          # con wildcard "$stagingDir/*" puo' saltare i file che iniziano con
          # un punto, quindi enumeriamo esplicitamente con Get-ChildItem -Force.
          $zipItems = Get-ChildItem -Path $stagingDir -Force
          Compress-Archive -Path $zipItems.FullName -DestinationPath $zipName -Force
          Write-Host "Zip portable creato: $zipName"
          Get-Item $zipName | Format-List Name, Length

          # Upload come asset della release draft creata da tauri-action.
          gh release upload $tag $zipName --clobber

  # Binari CLI (`pap`): cross-compilati e allegati alla release draft.
  # Go cross-compila senza runner nativi (CGO_ENABLED=0), quindi un solo
  # runner Linux produce tutti e 6 i target in pochi secondi. La ricetta
  # (versione Go, ldflags, go mod tidy) è identica a cli-build.yml, già
  # verde in CI; qui in più si allega ogni binario alla release.
  # `needs: build` garantisce che la release draft esista già (la crea
  # tauri-action nel job build) prima di `gh release upload`.
  # I binari NON sono firmati: Linux non lo richiede, macOS/Windows sì ma
  # la firma è un layer successivo (vedi note nel releaseBody).
  cli:
    name: CLI binaries
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.11"
          cache-dependency-path: apps/cli/go.sum

      - name: Resolve dependencies (genera go.sum se mancante)
        run: go mod tidy

      - name: Cross-compila e allega i binari alla release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          CGO_ENABLED: "0"
        run: |
          # Versione = tag senza la `v` iniziale (fonte autorevole per una
          # release, a differenza di cli-build.yml che deriva da package.json
          # sui push non-tag).
          VER="${TAG#v}"
          echo "cliVersion = ${VER}"
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            export GOOS="${t%/*}" GOARCH="${t#*/}"
            ext=""
            [ "$GOOS" = "windows" ] && ext=".exe"
            out="dist/pap-${GOOS}-${GOARCH}${ext}"
            echo "→ build $out"
            go build -ldflags="-s -w -X main.cliVersion=${VER}" -o "$out" .
            gh release upload "$TAG" "$out" --clobber
          done
