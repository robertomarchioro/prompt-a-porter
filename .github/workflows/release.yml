name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # NOTE: per semplificare i prossimi passaggi (debug v0.8.x) il
          # workflow è temporaneamente ridotto alla sola **versione
          # portable Windows**. Gli altri target sono commentati in attesa
          # di essere riabilitati quando si rigenera il pacchetto multi-OS.
          #
          # - platform: macos-14
          #   args: --target aarch64-apple-darwin
          #   rust-target: aarch64-apple-darwin
          # - platform: ubuntu-22.04
          #   args: ""
          #   rust-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            # NB: `--no-bundle` NON è usabile qui — tauri-action si
            # aspetta artifact bundle in `target/release/bundle/` e
            # fallisce con "No artifacts were found" se mancano (vedi
            # build v0.8.3 25626291738). Lasciamo bundle attivo: i
            # bundle MSI/NSIS aggiungono ~30s al build dopo cargo
            # release (~14m), trascurabile. La release avrà 5 asset
            # (msi/.sig + setup.exe/.sig + portable.zip), il portable
            # .zip è l'unico documentato in releaseBody.
            args: ""
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installa dipendenze sistema (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/client/src-tauri

      - name: Installa dipendenze pnpm
        run: pnpm install --frozen-lockfile

      - name: Build & release Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # v1.0 M1.4 — Tauri Updater signing (Ed25519, separato da
          # Authenticode). tauri-action genera `latest.json` + `.sig` se
          # questi secret sono presenti. Vedi
          # docs/architettura/decisioni/authenticode-signing.md
          # §"Tauri Updater key pair" per la procedura di generazione.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/client
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Prompt a Porter ${{ github.ref_name }}"
          releaseBody: |
            Build automatica dal tag `${{ github.ref_name }}`.

            Vedi [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) per il dettaglio.

            **Versione portable Windows** (unico artifact in questa release):
            il file `Prompt-a-Porter-portable-windows-x64-${{ github.ref_name }}.zip`
            contiene l'eseguibile standalone, senza installer. Estrai e lancia
            `Prompt a Porter.exe`. Richiede WebView2 runtime (incluso in
            Windows 11, scaricabile [da Microsoft](https://developer.microsoft.com/microsoft-edge/webview2/)
            per Windows 10).

            Il binario è firmato Authenticode (Certum Code Signing Open Source).
            La prima esecuzione potrebbe ancora mostrare un avviso SmartScreen
            (reputation building del nuovo certificato): clicca "Maggiori
            informazioni" → "Esegui comunque". L'avviso scompare con l'uso.

            > **Nota:** in questa release i target macOS / Linux / Windows
            > installer (.msi/.exe-setup) sono temporaneamente disabilitati
            > per semplificare il debug delle versioni v0.8.x. Saranno
            > rigenerati nelle release successive.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}

      # M1.2 v1.0 — Authenticode signing via Certum SimplySign Cloud.
      # Vedi docs/architettura/decisioni/authenticode-signing.md per la
      # decisione architetturale e la procedura di setup dei secret.
      #
      # Ordine: dopo tauri-action (build completata, bundle in target/
      # release/) e PRIMA di "Pacchettizza versione portable" (così il
      # binario raw che finisce nello zip portable è già firmato).
      - name: Install SimplySign Desktop (CI signing)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Install via WinGet — più robusto del download diretto da Certum
          # (URL hardcoded `files.certum.eu/.../SimplySignDesktop-Setup.exe`
          # ritorna 404 dato che il vero pattern Certum è versionato:
          # `.../Windows/<version>/SimplySignDesktop-<version>-64-bit-pl.msi`).
          # Package WinGet ufficiale: Certum.SmartSignSimplySignDesktop.
          Write-Host "Install SimplySign Desktop via WinGet..."
          winget install `
            --id Certum.SmartSignSimplySignDesktop `
            --accept-package-agreements `
            --accept-source-agreements `
            --silent `
            --disable-interactivity
          $exitCode = $LASTEXITCODE
          # WinGet exit code 0 = success, 0x8A150011 = already installed (ok),
          # altri = fail. -2147024894 (0x80070002) = file not found (network?).
          if ($exitCode -ne 0 -and $exitCode -ne -1978335215) {
            throw "WinGet install fallito (exit $exitCode)"
          }
          Write-Host "WinGet install OK (exit $exitCode)"

          # Find dinamicamente l'eseguibile: nome esatto può variare
          # (SimplySignDesktop.exe, SimplySign Desktop.exe, SimplySign.exe).
          # Cerco tutti gli .exe in Program Files* + LOCALAPPDATA che
          # contengono "SimplySign" nel nome.
          Write-Host "Find SimplySign exe..."
          $found = Get-ChildItem -Path "C:\Program Files (x86)","C:\Program Files","$env:LOCALAPPDATA\Programs" `
            -Recurse -Filter "*.exe" `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "*SimplySign*" } |
            Select-Object -First 1

          if (-not $found) {
            Write-Host "SimplySign exe non trovato. Dump install dirs candidate:"
            @("C:\Program Files (x86)\Certum","C:\Program Files\Certum","$env:LOCALAPPDATA\Programs\Certum") | ForEach-Object {
              if (Test-Path $_) {
                Write-Host "  $_"
                Get-ChildItem -Path $_ -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
                  ForEach-Object { Write-Host "    $($_.FullName)" }
              }
            }
            throw "SimplySign exe non trovato dopo WinGet install"
          }

          $simplySignExe = $found.FullName
          $simplySignDir = $found.DirectoryName
          Write-Host "SimplySign exe: $simplySignExe"
          # Esporta sia il path completo dell'exe (per step Firma) sia la
          # cartella (per uso futuro). GITHUB_ENV persiste fra step.
          "SIMPLYSIGN_EXE=$simplySignExe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SIMPLYSIGN_DIR=$simplySignDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Firma Authenticode (Certum SimplySign) + re-upload asset
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
          CERTUM_PASSWORD: ${{ secrets.CERTUM_PASSWORD }}
          CERTUM_TOTP_SEED: ${{ secrets.CERTUM_TOTP_SEED }}
          CERTUM_CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── 1. TOTP generation inline (RFC 6238 HMAC-SHA1, no extra deps) ──
          function Get-TOTP {
            param(
              [Parameter(Mandatory=$true)][string]$Base32Secret,
              [int]$TimeStep = 30,
              [int]$Digits = 6
            )
            $base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"
            $cleanSecret = ($Base32Secret.ToUpper() -replace "[^A-Z2-7]", "")
            $bits = ""
            foreach ($c in $cleanSecret.ToCharArray()) {
              $val = $base32chars.IndexOf($c)
              if ($val -lt 0) { throw "Invalid Base32 char: $c" }
              $bits += [Convert]::ToString($val, 2).PadLeft(5, '0')
            }
            $byteCount = [math]::Floor($bits.Length / 8)
            $bytes = New-Object byte[] $byteCount
            for ($i = 0; $i -lt $byteCount; $i++) {
              $bytes[$i] = [Convert]::ToByte($bits.Substring($i * 8, 8), 2)
            }
            $unixTime = [int64]([DateTimeOffset]::Now.ToUnixTimeSeconds())
            $counter = [int64][math]::Floor($unixTime / $TimeStep)
            $counterBytes = [BitConverter]::GetBytes($counter)
            if ([BitConverter]::IsLittleEndian) { [Array]::Reverse($counterBytes) }
            $hmac = New-Object System.Security.Cryptography.HMACSHA1
            $hmac.Key = $bytes
            $hash = $hmac.ComputeHash($counterBytes)
            $offset = $hash[-1] -band 0x0F
            $binCode = (([int]$hash[$offset] -band 0x7F) -shl 24) -bor `
                       (([int]$hash[$offset + 1] -band 0xFF) -shl 16) -bor `
                       (([int]$hash[$offset + 2] -band 0xFF) -shl 8) -bor `
                       ([int]$hash[$offset + 3] -band 0xFF)
            # Fix: [math]::Pow ritorna Double, mod risulta Double, e
            # Double.ToString("D6") fallisce ("Format specifier was invalid").
            # Calcoliamo $mod come int per restare in int-space.
            $mod = [int][math]::Pow(10, $Digits)
            $otp = $binCode % $mod
            return ([int]$otp).ToString("D$Digits")
          }

          $totp = Get-TOTP -Base32Secret $env:CERTUM_TOTP_SEED
          Write-Host "TOTP generato (6 cifre). Login SimplySign Desktop..."

          # ── 2. Login SimplySign Desktop ──
          # NOTE: i path/args CLI di SimplySign Desktop possono variare fra
          # release. Verifica il PDF "Installation_of_the_SimplySign_application"
          # di Certum se questo fallisce con "unknown argument".
          # SIMPLYSIGN_EXE viene da step precedente (Install via WinGet)
          # che fa path detection dinamica e lo esporta in GITHUB_ENV.
          $simplySignExe = $env:SIMPLYSIGN_EXE
          if (-not $simplySignExe -or -not (Test-Path $simplySignExe)) {
            throw "SIMPLYSIGN_EXE env var non settato o file inesistente. Step Install ha esportato il path?"
          }
          Write-Host "Login SimplySign via: $simplySignExe"
          & $simplySignExe `
            /silent /login `
            "/user:$env:CERTUM_USERNAME" `
            "/password:$env:CERTUM_PASSWORD" `
            "/totp:$totp"

          # Wait per virtual smart card pronta
          Write-Host "Attesa virtual smart card (max 30s)..."
          $maxWait = 30
          $cert = $null
          for ($i = 0; $i -lt $maxWait; $i++) {
            Start-Sleep -Seconds 1
            $cert = Get-ChildItem Cert:\CurrentUser\My -ErrorAction SilentlyContinue |
              Where-Object { $_.Thumbprint -eq $env:CERTUM_CERT_THUMBPRINT }
            if ($cert) {
              Write-Host "Cert disponibile dopo $($i+1)s: $($cert.Subject)"
              break
            }
          }
          if (-not $cert) {
            throw "Certificato $env:CERTUM_CERT_THUMBPRINT non disponibile nello store dopo $maxWait secondi. SimplySign login fallito?"
          }

          # ── 3. Trova signtool.exe (Windows SDK) ──
          $signtool = (Get-ChildItem -Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                       Sort-Object -Property FullName -Descending |
                       Select-Object -First 1).FullName
          if (-not $signtool) {
            throw "signtool.exe non trovato in Windows Kits. Windows SDK installato sul runner?"
          }
          Write-Host "signtool: $signtool"

          # ── 4. Raccogli artifact da firmare ──
          $releaseDir = "apps/client/src-tauri/target/release"
          $bundleDir = "$releaseDir/bundle"

          # 4a. Binario raw (verrà zippato dal step portable successivo)
          $rawCandidates = @(
            "$releaseDir/Prompt a Porter.exe",
            "$releaseDir/pap.exe"
          )
          $rawExe = $null
          foreach ($c in $rawCandidates) {
            if (Test-Path $c) { $rawExe = $c; break }
          }
          if (-not $rawExe) {
            $rawExe = (Get-ChildItem -Path $releaseDir -Filter *.exe -File |
                       Select-Object -First 1).FullName
          }

          # 4b. Bundle artifact (NSIS .exe setup, MSI .msi)
          $bundleArtifacts = @()
          if (Test-Path $bundleDir) {
            $bundleArtifacts = Get-ChildItem -Path $bundleDir -Recurse -File |
              Where-Object { $_.Extension -in ".exe", ".msi" } |
              ForEach-Object { $_.FullName }
          }

          $toSign = @()
          if ($rawExe) { $toSign += $rawExe }
          $toSign += $bundleArtifacts

          if ($toSign.Count -eq 0) {
            throw "Nessun artifact da firmare trovato in $releaseDir o $bundleDir"
          }

          Write-Host "Artifact da firmare: $($toSign.Count)"
          $toSign | ForEach-Object { Write-Host "  - $_" }

          # ── 5. Firma con signtool ──
          foreach ($file in $toSign) {
            Write-Host "Firmando $file..."
            & $signtool sign `
              /sha1 $env:CERTUM_CERT_THUMBPRINT `
              /tr "http://time.certum.pl" `
              /td sha256 `
              /fd sha256 `
              /a `
              $file
            if ($LASTEXITCODE -ne 0) {
              throw "Signing failed for $file (exit $LASTEXITCODE)"
            }
          }

          # ── 6. Verifica firma ──
          foreach ($file in $toSign) {
            & $signtool verify /pa /v $file
            if ($LASTEXITCODE -ne 0) {
              throw "Signature verification failed for $file"
            }
          }
          Write-Host "Tutte le firme verificate."

          # ── 7. Re-upload bundle firmati come asset (clobber unsigned di
          #    tauri-action). Il rawExe NON va re-uploadato: finisce zippato
          #    dal step "Pacchettizza versione portable" successivo.
          $tag = "${{ github.ref_name }}"
          if ($bundleArtifacts.Count -gt 0) {
            foreach ($file in $bundleArtifacts) {
              Write-Host "Re-upload firmato: $(Split-Path $file -Leaf)"
              gh release upload $tag $file --clobber
              if ($LASTEXITCODE -ne 0) {
                throw "gh release upload failed for $file"
              }
            }
          } else {
            Write-Host "Nessun bundle artifact da re-uploadare (build minimal portable-only)."
          }

      # Windows portable: zippa il .exe standalone + README e lo carica come
      # asset extra della release draft. Pattern Chrome/VSCode portable —
      # utente estrae lo zip e lancia l'eseguibile, niente installer.
      - name: Pacchettizza versione portable (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $finalName = "Prompt a Porter.exe"
          $releaseDir = "apps/client/src-tauri/target/release"

          # Preferisci il binario rinominato dal bundle Tauri (productName);
          # fallback sul binario Cargo (package.name) e rinomina nel zip.
          $exePath = $null
          $candidatesByName = @(
            "$releaseDir/$finalName",
            "$releaseDir/pap.exe"
          )
          foreach ($c in $candidatesByName) {
            if (Test-Path $c) {
              $exePath = $c
              break
            }
          }
          # Fallback ulteriore: glob su qualsiasi .exe nella radice di release/
          # (esclude la subdir bundle/ che contiene gli installer NSIS/MSI).
          if (-not $exePath) {
            $exePath = Get-ChildItem -Path $releaseDir -Filter *.exe -File `
              | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $exePath -or -not (Test-Path $exePath)) {
            Write-Error "Eseguibile portable non trovato in $releaseDir."
            Write-Host "Contenuto di $releaseDir :"
            Get-ChildItem -Path $releaseDir -Filter *.exe -File `
              | Format-Table Name, Length
            exit 1
          }
          Write-Host "Eseguibile portable scelto: $exePath"

          $tag = "${{ github.ref_name }}"
          $stagingDir = "portable-staging"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          # Rinomina sempre a "Prompt a Porter.exe" nel zip per coerenza UX
          # con il bundle installer.
          Copy-Item $exePath -Destination "$stagingDir/$finalName"

          $readmeContent = @"
          Prompt a Porter — versione portable Windows ($tag)
          ===================================================

          Questa cartella contiene la versione portable di Prompt a Porter:
          un singolo eseguibile, niente installer, niente registro modificato.

          Come usare
          ----------
          1. Estrai questo zip dove preferisci (pen drive, Documents, etc.)
          2. Doppio click su "Prompt a Porter.exe"
          3. Al primo avvio Windows SmartScreen potrebbe avvisarti perché
             il binario non è firmato Authenticode. Clicca "Maggiori
             informazioni" -> "Esegui comunque".

          Requisiti
          ---------
          - Windows 10 (1803+) o Windows 11
          - WebView2 Runtime: incluso in Windows 11. Su Windows 10 va
            installato manualmente da:
            https://developer.microsoft.com/microsoft-edge/webview2/

          Dati utente
          -----------
          Il vault e le preferenze vengono salvati in
          %APPDATA%\com.pap.app\ (NON nella cartella dell'eseguibile).
          Per una vera modalita "portable senza traccia" copia anche
          la cartella %APPDATA%\com.pap.app\ sulla pen drive.

          Disinstallare
          -------------
          Cancella la cartella estratta. Per rimuovere anche i dati,
          cancella %APPDATA%\com.pap.app\.

          Source: https://github.com/${{ github.repository }}
          Licenza: AGPL-3.0-only
          "@
          $readmeContent | Out-File -FilePath "$stagingDir/README.txt" -Encoding utf8

          $zipName = "Prompt-a-Porter-portable-windows-x64-$tag.zip"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath $zipName -Force
          Write-Host "Zip portable creato: $zipName"
          Get-Item $zipName | Format-List Name, Length

          # Upload come asset della release draft creata da tauri-action.
          gh release upload $tag $zipName --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
