name: MCP Server Build

on:
  push:
    branches: [main]
    paths:
      - "apps/mcp-server/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "!apps/mcp-server/**/*.md"
      - "!apps/mcp-server/**/CHANGELOG.md"
      - "!apps/mcp-server/**/LICENSE"
  pull_request:
    branches: [main]
    paths:
      - "apps/mcp-server/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "!apps/mcp-server/**/*.md"
      - "!apps/mcp-server/**/CHANGELOG.md"
      - "!apps/mcp-server/**/LICENSE"
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installa dipendenze
        run: pnpm install --frozen-lockfile

      - name: Type-check (lint)
        run: pnpm --filter @pap/mcp-server lint

      - name: Test con coverage (gate 80%)
        run: pnpm --filter @pap/mcp-server test:coverage

      - name: Build TypeScript
        run: pnpm --filter @pap/mcp-server build

      - name: Verifica output
        run: |
          test -f apps/mcp-server/dist/index.js
          echo "Build artifact OK"
