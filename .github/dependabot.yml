version: 2

updates:
  # === Rust / Cargo (client Tauri) ===
  # Le PR Dependabot saranno validate dalla stable lane (--locked) prima
  # del merge: il Cargo.lock committato garantisce che CI sia riproducibile.
  # I pin brotli/alloc-no-stdlib in Cargo.toml restano come guardia secondaria
  # finché l'ecosistema upstream non si allinea a alloc-no-stdlib 3.x.
  - package-ecosystem: cargo
    directory: /apps/client/src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # === Node / pnpm (workspace root) ===
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      # vitest e @vitest/coverage-v8 sono accoppiati: coverage-v8 4.x
      # richiede vitest 4.x (e viceversa). Vanno bumpati INSIEME anche sui
      # major, altrimenti Dependabot apre PR separate che si escludono a
      # vicenda e falliscono in CI (vedi #492, PR #490/#491). Questo gruppo
      # precede patch-minor così da rivendicare i pacchetti vitest per ogni
      # tipo di update (Dependabot assegna al primo gruppo che matcha).
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
        update-types:
          - minor
          - patch
          - major
      patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # === GitHub Actions ===
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    groups:
      patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Toolchain Rust gestito A MANO in lockstep: il ref `@x.y.z` nei
      # workflow e `rust-toolchain.toml` (channel) devono muoversi insieme.
      # Dependabot bumpa solo il ref → desync e CI rossa (vedi #317/#336).
      - dependency-name: "dtolnay/rust-toolchain"

  # === Go (server) ===
  - package-ecosystem: gomod
    directory: /apps/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # === Go (CLI) ===
  - package-ecosystem: gomod
    directory: /apps/cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      patch-minor:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
