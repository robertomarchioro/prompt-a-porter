<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Prompt a Porter — Generatore Icone</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 32px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p.hint { color: #888; margin-bottom: 24px; font-size: 14px; }
    .griglia { display: flex; flex-wrap: wrap; gap: 24px; }
    .card { background: #2a2a2a; border-radius: 12px; padding: 16px; text-align: center; }
    .card canvas { border: 1px solid #333; border-radius: 8px; image-rendering: auto; }
    .card .label { margin-top: 8px; font-size: 13px; color: #aaa; }
    .card a { display: inline-block; margin-top: 8px; color: #F59E0B; text-decoration: none; font-size: 13px; cursor: pointer; }
    .card a:hover { text-decoration: underline; }
    .sezione { margin-top: 32px; }
    h2 { font-size: 18px; margin-bottom: 12px; color: #F59E0B; }
  </style>
</head>
<body>
  <h1>Prompt a Porter — Generatore Icone</h1>
  <p class="hint">
    Apri questo file nel browser, poi clicca "Scarica" per salvare ogni PNG.<br>
    Dopo aver salvato <code>icon.png</code> (1024×1024), puoi rigenerare tutti i formati con:<br>
    <code>pnpm tauri icon icons/icon.png</code>
  </p>

  <div class="sezione">
    <h2>Icona App (sfondo ambra)</h2>
    <div class="griglia" id="app-icons"></div>
  </div>

  <div class="sezione">
    <h2>Icona Tray (monocromatica)</h2>
    <div class="griglia" id="tray-icons"></div>
  </div>

  <script>
    const dimensioniApp = [
      { w: 1024, nome: "icon.png" },
      { w: 512,  nome: "icon-512.png" },
      { w: 256,  nome: "128x128@2x.png" },
      { w: 128,  nome: "128x128.png" },
      { w: 32,   nome: "32x32.png" },
    ];

    const dimensioniTray = [
      { w: 44, nome: "tray-44.png" },
      { w: 32, nome: "tray-32.png" },
      { w: 22, nome: "tray-22.png" },
      { w: 16, nome: "tray-16.png" },
    ];

    function disegnaBracesApp(ctx, size) {
      const r = size * 0.223;
      const pad = 0;

      // Sfondo arrotondato con gradiente ambra
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, "#FBBF24");
      grad.addColorStop(0.5, "#F59E0B");
      grad.addColorStop(1, "#D97706");

      ctx.beginPath();
      ctx.roundRect(pad, pad, size - pad * 2, size - pad * 2, r);
      ctx.fillStyle = grad;
      ctx.fill();

      // Braces bianche centrate (65% dell'area)
      const bSize = size * 0.65;
      const offset = (size - bSize) / 2;
      const scale = bSize / 24;

      ctx.save();
      ctx.translate(offset, offset);
      ctx.scale(scale, scale);
      ctx.strokeStyle = "white";
      ctx.lineWidth = 1.6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // Parentesi sinistra {
      ctx.beginPath();
      ctx.moveTo(8, 3);
      ctx.lineTo(7, 3);
      ctx.arcTo(5, 3, 5, 5, 2);
      ctx.lineTo(5, 10);
      ctx.arcTo(5, 12, 3, 12, 2);
      ctx.arcTo(5, 12, 5, 14, 2);
      ctx.lineTo(5, 19);
      ctx.arcTo(5, 21, 7, 21, 2);
      ctx.lineTo(8, 21);
      ctx.stroke();

      // Parentesi destra }
      ctx.beginPath();
      ctx.moveTo(16, 21);
      ctx.lineTo(17, 21);
      ctx.arcTo(19, 21, 19, 19, 2);
      ctx.lineTo(19, 14);
      ctx.arcTo(19, 12, 21, 12, 2);
      ctx.arcTo(19, 12, 19, 10, 2);
      ctx.lineTo(19, 5);
      ctx.arcTo(19, 3, 17, 3, 2);
      ctx.lineTo(16, 3);
      ctx.stroke();

      ctx.restore();
    }

    function disegnaBracesTray(ctx, size) {
      const scale = size / 24;
      ctx.save();
      ctx.scale(scale, scale);
      ctx.strokeStyle = "black";
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // Parentesi sinistra
      ctx.beginPath();
      ctx.moveTo(8, 3);
      ctx.lineTo(7, 3);
      ctx.arcTo(5, 3, 5, 5, 2);
      ctx.lineTo(5, 10);
      ctx.arcTo(5, 12, 3, 12, 2);
      ctx.arcTo(5, 12, 5, 14, 2);
      ctx.lineTo(5, 19);
      ctx.arcTo(5, 21, 7, 21, 2);
      ctx.lineTo(8, 21);
      ctx.stroke();

      // Parentesi destra
      ctx.beginPath();
      ctx.moveTo(16, 21);
      ctx.lineTo(17, 21);
      ctx.arcTo(19, 21, 19, 19, 2);
      ctx.lineTo(19, 14);
      ctx.arcTo(19, 12, 21, 12, 2);
      ctx.arcTo(19, 12, 19, 10, 2);
      ctx.lineTo(19, 5);
      ctx.arcTo(19, 3, 17, 3, 2);
      ctx.lineTo(16, 3);
      ctx.stroke();

      ctx.restore();
    }

    function creaCard(container, dim, disegna) {
      const card = document.createElement("div");
      card.className = "card";

      const canvas = document.createElement("canvas");
      canvas.width = dim.w;
      canvas.height = dim.w;
      const displaySize = Math.min(dim.w, 128);
      canvas.style.width = displaySize + "px";
      canvas.style.height = displaySize + "px";

      const ctx = canvas.getContext("2d");
      disegna(ctx, dim.w);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = `${dim.w}×${dim.w} — ${dim.nome}`;

      const link = document.createElement("a");
      link.textContent = "Scarica";
      link.addEventListener("click", () => {
        const a = document.createElement("a");
        a.download = dim.nome;
        a.href = canvas.toDataURL("image/png");
        a.click();
      });

      card.appendChild(canvas);
      card.appendChild(label);
      card.appendChild(link);
      container.appendChild(card);
    }

    const appContainer = document.getElementById("app-icons");
    const trayContainer = document.getElementById("tray-icons");

    dimensioniApp.forEach(d => creaCard(appContainer, d, disegnaBracesApp));
    dimensioniTray.forEach(d => creaCard(trayContainer, d, disegnaBracesTray));
  </script>
</body>
</html>
