[package]
name = "pap"
version = "0.1.0"
description = "Prompt a Porter — Libreria locale per prompt AI"
authors = ["Roberto Marchioro"]
license = "GPL-2.0-only"
edition = "2021"
rust-version = "1.77"

[lib]
name = "pap_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-global-shortcut = "2"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
